name: Bug report
description: Report a defect in EF QueryLens
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version/commit
      placeholder: e.g. main@abcdef
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: VS Code / Visual Studio / Rider + OS + .NET SDK
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible scenario.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
