name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-vscode-extension:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - win32-x64
          - win32-arm64
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and package VS Code extension
        working-directory: src/Plugins/ef-querylens-vscode
        run: |
          npm ci
          npm run compile
          npm run prepare-runtime
          npx --yes @vscode/vsce package --pre-release --target ${{ matrix.target }} -o ef-querylens-vscode-${{ matrix.target }}.vsix
      - name: Upload VS Code artifact
        uses: actions/upload-artifact@v4
        with:
          name: ef-querylens-vscode-${{ matrix.target }}
          path: src/Plugins/ef-querylens-vscode/ef-querylens-vscode-${{ matrix.target }}.vsix

  build-rider-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build runtime dependencies
        run: |
          dotnet build src/EFQueryLens.Lsp/EFQueryLens.Lsp.csproj -c Debug
          dotnet build src/EFQueryLens.Daemon/EFQueryLens.Daemon.csproj -c Debug
      - name: Build Rider plugin
        working-directory: src/Plugins/ef-querylens-rider
        run: |
          chmod +x ./gradlew
          ./gradlew buildPlugin --no-daemon
      - name: Upload Rider artifact
        uses: actions/upload-artifact@v4
        with:
          name: ef-querylens-rider
          path: src/Plugins/ef-querylens-rider/build/distributions/*.zip

  build-visual-studio-extension:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build Visual Studio extension
        run: dotnet build src/Plugins/ef-querylens-visualstudio/EFQueryLens.VisualStudio/EFQueryLens.VisualStudio.csproj -c Debug
      - name: Upload Visual Studio artifact
        uses: actions/upload-artifact@v4
        with:
          name: ef-querylens-visualstudio
          path: src/Plugins/ef-querylens-visualstudio/EFQueryLens.VisualStudio/bin/Debug/net472/*.vsix

  release:
    runs-on: ubuntu-latest
    needs:
      - build-vscode-extension
      - build-rider-plugin
      - build-visual-studio-extension
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.vsix
            release-assets/**/*.zip
