name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Test Core
        run: dotnet test EFQueryLens.slnx -c Debug

  test-vscode-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build and test VS Code plugin
        working-directory: src/Plugins/ef-querylens-vscode
        run: |
          npm ci
          npm run compile
          npm run test

  test-rider-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and test Rider plugin
        working-directory: src/Plugins/ef-querylens-rider
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  build-visual-studio-extension-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build Visual Studio extension
        run: dotnet build src/Plugins/ef-querylens-visualstudio/EFQueryLens.VisualStudio/EFQueryLens.VisualStudio.csproj -c Debug
