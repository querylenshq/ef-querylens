syntax = "proto3";

package querylens;
option csharp_namespace = "EFQueryLens.Core.Grpc";

service DaemonService {
  rpc Translate(TranslateRequest) returns (TranslateResponse);
  rpc TranslateQueued(QueuedTranslateRequest) returns (QueuedTranslateResponse);
  rpc InspectModel(InspectModelRequest) returns (InspectModelResponse);
  rpc InvalidateCache(InvalidateCacheRequest) returns (InvalidateCacheResponse);
  rpc GetState(GetStateRequest) returns (GetStateResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc Subscribe(SubscribeRequest) returns (stream DaemonEvent);
}

enum WarningSeverity {
  WARNING_SEVERITY_INFO = 0;
  WARNING_SEVERITY_WARNING = 1;
  WARNING_SEVERITY_CRITICAL = 2;
}

enum TranslationStatus {
  TRANSLATION_STATUS_READY = 0;
  TRANSLATION_STATUS_IN_QUEUE = 1;
  TRANSLATION_STATUS_STARTING = 2;
  TRANSLATION_STATUS_UNREACHABLE = 3;
}

enum DaemonWarmState {
  DAEMON_WARM_STATE_COLD = 0;
  DAEMON_WARM_STATE_WARMING = 1;
  DAEMON_WARM_STATE_READY = 2;
}

enum CacheInvalidationScope {
  CACHE_INVALIDATION_SCOPE_QUERY_RESULTS = 0;
  CACHE_INVALIDATION_SCOPE_ALL = 1;
}

message QueryWarning {
  WarningSeverity severity = 1;
  string code = 2;
  string message = 3;
  optional string suggestion = 4;
}

message QueryParameter {
  string name = 1;
  string clr_type = 2;
  optional string inferred_value = 3;
}

message QuerySqlCommand {
  string sql = 1;
  repeated QueryParameter parameters = 2;
}

message TranslationMetadata {
  string db_context_type = 1;
  string ef_core_version = 2;
  string provider_name = 3;
  int64 translation_time_ticks = 4;
  optional int64 context_resolution_time_ticks = 5;
  optional int64 db_context_creation_time_ticks = 6;
  optional int64 metadata_reference_build_time_ticks = 7;
  optional int64 roslyn_compilation_time_ticks = 8;
  optional int32 compilation_retry_count = 9;
  optional int64 eval_assembly_load_time_ticks = 10;
  optional int64 runner_execution_time_ticks = 11;
  optional int64 to_query_string_fallback_time_ticks = 12;
  bool has_client_evaluation = 13;
  string creation_strategy = 14;
}

message TranslationRequestPayload {
  string expression = 1;
  string assembly_path = 2;
  optional string db_context_type_name = 3;
  string context_variable_name = 4;
  repeated string additional_imports = 5;
  map<string, string> using_aliases = 6;
  repeated string using_static_types = 7;
}

message TranslationResult {
  bool success = 1;
  optional string sql = 2;
  repeated QuerySqlCommand commands = 3;
  repeated QueryParameter parameters = 4;
  repeated QueryWarning warnings = 5;
  optional string error_message = 6;
  TranslationMetadata metadata = 7;
}

message TranslateRequest {
  string context_name = 1;
  TranslationRequestPayload request = 2;
}

message TranslateResponse {
  TranslationResult result = 1;
}

message QueuedTranslateRequest {
  string context_name = 1;
  string semantic_key = 2;
  TranslationRequestPayload request = 3;
}

message QueuedTranslateResponse {
  TranslationStatus status = 1;
  optional string job_id = 2;
  double average_translation_ms = 3;
  optional TranslationResult result = 4;
}

message InspectModelRequest {
  string context_name = 1;
  string assembly_path = 2;
  optional string db_context_type_name = 3;
}

message PropertySnapshot {
  string name = 1;
  string clr_type = 2;
  string column_name = 3;
  bool is_key = 4;
  bool is_nullable = 5;
}

message NavigationSnapshot {
  string name = 1;
  string target_entity = 2;
  bool is_collection = 3;
  optional string foreign_key = 4;
}

message IndexSnapshot {
  repeated string columns = 1;
  bool is_unique = 2;
  optional string name = 3;
}

message EntitySnapshot {
  string clr_type = 1;
  string table_name = 2;
  repeated PropertySnapshot properties = 3;
  repeated NavigationSnapshot navigations = 4;
  repeated IndexSnapshot indexes = 5;
}

message ModelSnapshot {
  string db_context_type = 1;
  repeated string db_set_properties = 2;
  repeated EntitySnapshot entities = 3;
}

message InspectModelResponse {
  ModelSnapshot result = 1;
}

message InvalidateCacheRequest {
  string context_name = 1;
  CacheInvalidationScope scope = 2;
}

message InvalidateCacheResponse {
  bool success = 1;
  string message = 2;
  int32 removed_cached_results = 3;
  int32 removed_inflight_jobs = 4;
}

message GetStateRequest {}

message ContextStateEntry {
  string context_name = 1;
  DaemonWarmState state = 2;
}

message GetStateResponse {
  repeated ContextStateEntry contexts = 1;
}

message PingRequest {}

message PingResponse {
  string version = 1;
  int64 uptime_ms = 2;
}

message ShutdownRequest {}

message ShutdownResponse {}

message SubscribeRequest {}

message StateChangedEvent {
  string context_name = 1;
  DaemonWarmState state = 2;
}

message ConfigReloadedEvent {
  repeated string context_names = 1;
}

message AssemblyChangedEvent {
  string context_name = 1;
  string assembly_path = 2;
}

message DaemonEvent {
  oneof event {
    StateChangedEvent state_changed = 1;
    ConfigReloadedEvent config_reloaded = 2;
    AssemblyChangedEvent assembly_changed = 3;
  }
}
